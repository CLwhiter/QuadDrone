# Application-specific configuration for QuadDrone ANO Remote Controller
# This layer builds on top of the board-level defconfig

# Enable console for debugging
CONFIG_LOG=y
CONFIG_LOG_RUNTIME_FILTERING=n
CONFIG_LOG_DEFAULT_LEVEL=1

# Enable LED debugging support
CONFIG_LED=y
CONFIG_LED_GPIO=y

# Configure GPIO for LED (PC13, active low)
CONFIG_GPIO=y
CONFIG_GPIO_LEDS=y

# Enable ADC for multi-channel reading
CONFIG_ADC=y
CONFIG_ADC_1=y
CONFIG_ADC_DT=y

# Enable SPI for OLED display
CONFIG_SPI=y
CONFIG_SPI_BITBANG=y

# Enable GPIO support
CONFIG_GPIO=y

# System configuration for better debugging
CONFIG_INIT_STACKS=y
CONFIG_PRINTK=y

# Optional: Enable specific debug modules
# CONFIG_LOG_BACKEND_UART=y
# CONFIG_UART_LINE_CTRL=y

# Clock configuration validation
CONFIG_CLOCK_MONITOR=n  # Disable to save space